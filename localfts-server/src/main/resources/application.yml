server:
  port: 80
  servlet:
    context-path: /localfts
  error:
    includeException: true
    includeStackTrace: ALWAYS
    whitelabel:
      enabled: false
spring:
  thymeleaf:
    cache: false
  mvc:
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/resources
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
      #resolve-lazily: true
      #file-size-threshold: 0
localfts:
  root_path: D:\Users\Adam\Documents
  zip:
    enabled: true
    path: D:\Users\Adam\Documents\localfts_zip
    delete_on_exit: true
    max-folder-size: 3GB
    background-enabled: false
  log:
    file_path: log
    root_level: DEBUG
  test_language:
    Simplified_Chinese: true